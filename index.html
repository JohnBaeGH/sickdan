<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식구 (SIKGOO) - 스마트 구내식당 식단표</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Client (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="pb-12">

    <!-- 상단 네비게이션 헤더 -->
    <header class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-utensils text-2xl animate-bounce"></i>
                <h1 class="text-xl font-bold tracking-tight">식구 <span class="text-xs font-normal text-teal-100">SIKGOO</span></h1>
            </div>
            <div class="flex items-center space-x-3">
                <button id="btnAdminTab" class="text-sm bg-teal-800 bg-opacity-40 hover:bg-opacity-60 px-3 py-1.5 rounded-full transition-all text-teal-100 border border-teal-500/30">
                    <i class="fa-solid fa-user-gear mr-1"></i>관리자
                </button>
                <button id="btnSettings" class="text-teal-100 hover:text-white transition-all p-1">
                    <i class="fa-solid fa-gear text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        <!-- 앱 알림 영역 -->
        <div id="alertBox" class="hidden mb-4 p-4 rounded-xl border flex items-start space-x-2 transition-all">
            <span id="alertIcon" class="mt-0.5"></span>
            <div class="flex-1">
                <h4 id="alertTitle" class="font-bold text-sm"></h4>
                <p id="alertMsg" class="text-xs mt-0.5 text-gray-600"></p>
            </div>
            <button onclick="closeAlert()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- 탭 1: 직원용 금주의 식단표 화면 -->
        <section id="tabEmployee" class="space-y-4">
            <!-- 요일 탭 선택 슬라이더 -->
            <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 flex justify-between overflow-x-auto gap-1">
                <button onclick="selectDay(1)" class="day-btn flex-1 py-3 text-center rounded-xl transition-all font-medium text-sm text-gray-400 hover:bg-gray-50" data-day="1">
                    월<span class="block text-[10px] font-normal" id="date-label-1">-</span>
                </button>
                <button onclick="selectDay(2)" class="day-btn flex-1 py-3 text-center rounded-xl transition-all font-medium text-sm text-gray-400 hover:bg-gray-50" data-day="2">
                    화<span class="block text-[10px] font-normal" id="date-label-2">-</span>
                </button>
                <button onclick="selectDay(3)" class="day-btn flex-1 py-3 text-center rounded-xl transition-all font-medium text-sm text-gray-400 hover:bg-gray-50" data-day="3">
                    수<span class="block text-[10px] font-normal" id="date-label-3">-</span>
                </button>
                <button onclick="selectDay(4)" class="day-btn flex-1 py-3 text-center rounded-xl transition-all font-medium text-sm text-gray-400 hover:bg-gray-50" data-day="4">
                    목<span class="block text-[10px] font-normal" id="date-label-4">-</span>
                </button>
                <button onclick="selectDay(5)" class="day-btn flex-1 py-3 text-center rounded-xl transition-all font-medium text-sm text-gray-400 hover:bg-gray-50" data-day="5">
                    금<span class="block text-[10px] font-normal" id="date-label-5">-</span>
                </button>
            </div>

            <!-- 끼니 구분 -->
            <div class="flex rounded-xl bg-gray-200/60 p-1 text-sm font-medium">
                <button onclick="selectMeal('아침')" class="meal-btn flex-grow py-2 text-center rounded-lg transition-all" data-meal="아침">아침</button>
                <button onclick="selectMeal('점심')" class="meal-btn flex-grow py-2 text-center rounded-lg transition-all" data-meal="점심">점심</button>
                <button onclick="selectMeal('저녁')" class="meal-btn flex-grow py-2 text-center rounded-lg transition-all" data-meal="저녁">저녁</button>
            </div>

            <!-- 식단 디테일 리스트 -->
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 space-y-4">
                <div class="flex justify-between items-center border-b pb-3 border-gray-100">
                    <h3 class="font-bold text-gray-800 text-base" id="currentViewTitle">오늘의 메뉴</h3>
                    <span id="calorieTotal" class="bg-rose-50 text-rose-600 text-xs px-2.5 py-1 rounded-full font-bold">0 Kcal</span>
                </div>

                <!-- 식단 로딩 중 상태 -->
                <div id="menuLoading" class="hidden py-12 text-center">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent mb-2"></div>
                    <p class="text-sm text-gray-500">실시간 급식 데이터를 조회하고 있어요...</p>
                </div>

                <!-- 식단 비어있음 상태 -->
                <div id="menuEmpty" class="py-12 text-center space-y-3">
                    <span class="text-4xl">🗓️</span>
                    <p class="text-sm text-gray-400 font-medium">등록된 식단표가 없습니다.</p>
                </div>

                <!-- 실시간 메뉴 카드 리스트 -->
                <div id="menuContainer" class="grid grid-cols-1 gap-4">
                    <!-- 동적 카드 추가 영역 -->
                </div>
            </div>
        </section>

        <!-- 탭 2: 관리자 주간식단표 등록 화면 -->
        <section id="tabAdmin" class="hidden space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 space-y-4">
                <div class="flex items-center justify-between border-b pb-4 border-gray-100">
                    <h2 class="font-bold text-lg text-gray-800 flex items-center gap-2">
                        <i class="fa-solid fa-camera text-emerald-600"></i>AI 주간식단 분석 등록
                    </h2>
                    <button id="btnBackToHome" class="text-sm text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i> 닫기</button>
                </div>

                <p class="text-xs text-gray-500 leading-relaxed">
                    영양사 선생님께 받은 주간식단표 이미지 파일을 업로드해 주세요. AI가 자동으로 날짜별 음식을 판독하고 실제 먹음직스러운 요리 이미지를 매핑하여 저장합니다.
                </p>

                <!-- 이미지 업로드 박스 -->
                <div class="border-2 border-dashed border-gray-200 hover:border-emerald-500 rounded-2xl p-6 transition-all text-center relative cursor-pointer" id="dropZone">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <div id="dropZoneContent" class="space-y-2">
                        <div class="text-3xl">📂</div>
                        <p class="text-sm font-medium text-gray-700">식단 이미지 파일 선택</p>
                        <p class="text-xs text-gray-400">Drag & Drop 또는 터치하여 업로드</p>
                    </div>
                    <!-- 미리보기 영역 -->
                    <div id="previewContainer" class="hidden space-y-2">
                        <img id="imagePreview" class="max-h-48 mx-auto rounded-lg shadow-sm border border-gray-100">
                        <p id="previewFileName" class="text-xs text-gray-500 font-medium truncate"></p>
                    </div>
                </div>

                <!-- 업로드 및 생성 진행도 인디케이터 -->
                <div id="analysisProgress" class="hidden bg-emerald-50/50 border border-emerald-100 rounded-2xl p-4 space-y-3">
                    <div class="flex justify-between items-center text-xs font-semibold text-emerald-700">
                        <span id="statusText">식단표 문자 분석 중...</span>
                        <span id="percentText">0%</span>
                    </div>
                    <div class="w-full bg-emerald-100 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-emerald-500 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <p class="text-[11px] text-emerald-600/80 leading-normal" id="progressDetail">Google Gemini OCR을 실행하는 중입니다.</p>
                </div>

                <button id="btnStartAnalysis" disabled class="w-full bg-gray-300 text-white font-bold py-3.5 rounded-2xl transition-all text-sm flex items-center justify-center gap-2 cursor-not-allowed">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>AI 식단 자동 분석 & 이미지 생성 시작
                </button>
            </div>
        </section>
    </main>

    <!-- 설정 모달 -->
    <div id="modalSettings" class="fixed inset-0 bg-black/50 z-50 hidden transition-opacity flex justify-end">
        <div class="bg-white w-full max-w-sm h-full p-6 shadow-2xl overflow-y-auto flex flex-col justify-between">
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b pb-4 border-gray-100">
                    <h3 class="font-bold text-lg text-gray-800 flex items-center gap-2">
                        <i class="fa-solid fa-key text-teal-600"></i>API 및 DB 설정
                    </h3>
                    <button onclick="toggleSettingsModal(false)" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>

                <div class="space-y-4">
                    <!-- Google API Key -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 flex justify-between">
                            <span>Google API Key</span>
                            <span class="text-[10px] text-teal-600 font-normal">Gemini & Imagen AI용</span>
                        </label>
                        <input type="password" id="cfgGoogleKey" placeholder="AI-ZaSy..." class="w-full px-3 py-2.5 text-sm border rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                    </div>

                    <!-- Supabase URL -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5">Supabase URL</label>
                        <input type="text" id="cfgSupabaseUrl" placeholder="https://xxxx.supabase.co" class="w-full px-3 py-2.5 text-sm border rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                    </div>

                    <!-- Supabase Anon Key -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 flex justify-between">
                            <span>Supabase Anon Key</span>
                            <span class="text-[10px] text-emerald-600 font-normal">Anon/Public key만 입력!</span>
                        </label>
                        <input type="password" id="cfgSupabaseKey" placeholder="eyJhbGci..." class="w-full px-3 py-2.5 text-sm border rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-100 space-y-2">
                <button onclick="saveConfigurations()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition-all text-sm">
                    설정 저장
                </button>
                <button onclick="toggleSettingsModal(false)" class="w-full bg-gray-100 text-gray-500 font-medium py-3 rounded-xl hover:bg-gray-200 transition-all text-sm">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <script>
        // 전역 상태 및 API 객체 관리
        let supabaseClient = null;
        let selectedDate = new Date();
        let currentMealType = '점심';

        // UI 돔 엘리먼트 캐싱
        const elAdminTab = document.getElementById('tabAdmin');
        const elEmployeeTab = document.getElementById('tabEmployee');
        const elBtnAdminTab = document.getElementById('btnAdminTab');
        const elBtnBackToHome = document.getElementById('btnBackToHome');
        const elBtnSettings = document.getElementById('btnSettings');
        const elModalSettings = document.getElementById('modalSettings');

        const elDropZone = document.getElementById('dropZone');
        const elFileInput = document.getElementById('fileInput');
        const elDropZoneContent = document.getElementById('dropZoneContent');
        const elPreviewContainer = document.getElementById('previewContainer');
        const elImagePreview = document.getElementById('imagePreview');
        const elPreviewFileName = document.getElementById('previewFileName');
        const elBtnStartAnalysis = document.getElementById('btnStartAnalysis');

        const elAnalysisProgress = document.getElementById('analysisProgress');
        const elStatusText = document.getElementById('statusText');
        const elPercentText = document.getElementById('percentText');
        const elProgressBar = document.getElementById('progressBar');
        const elProgressDetail = document.getElementById('progressDetail');

        const elMenuContainer = document.getElementById('menuContainer');
        const elMenuLoading = document.getElementById('menuLoading');
        const elMenuEmpty = document.getElementById('menuEmpty');
        const elCalorieTotal = document.getElementById('calorieTotal');
        const elCurrentViewTitle = document.getElementById('currentViewTitle');

        window.addEventListener('load', () => {
            initDateLabels();
            loadSavedConfigurations();
            setupEventListeners();
            selectDay(new Date().getDay() || 7);
            updateMealTabUi();
        });

        // 주간 날짜 헤더 계산 및 라벨 갱신
        function initDateLabels() {
            const now = new Date();
            const currentDay = now.getDay(); 
            const distanceToMonday = 1 - (currentDay === 0 ? 7 : currentDay); 
            const monday = new Date(now);
            monday.setDate(now.getDate() + distanceToMonday);

            for (let i = 1; i <= 5; i++) {
                const targetDate = new Date(monday);
                targetDate.setDate(monday.getDate() + (i - 1));
                
                const month = targetDate.getMonth() + 1;
                const day = targetDate.getDate();
                const labelElement = document.getElementById(`date-label-${i}`);
                if (labelElement) {
                    labelElement.innerText = `${month}/${day}`;
                    labelElement.setAttribute('data-full-date', targetDate.toISOString().split('T')[0]);
                }
            }
        }

        // 로컬 스토리지에 저장된 설정 로딩
        function loadSavedConfigurations() {
            const gKey = localStorage.getItem('cfg_google_key');
            const sUrl = localStorage.getItem('cfg_supabase_url');
            const sKey = localStorage.getItem('cfg_supabase_key');

            if (gKey) document.getElementById('cfgGoogleKey').value = gKey;
            if (sUrl) document.getElementById('cfgSupabaseUrl').value = sUrl;
            if (sKey) document.getElementById('cfgSupabaseKey').value = sKey;

            if (sUrl && sKey) {
                try {
                    supabaseClient = supabase.createClient(sUrl, sKey);
                    console.log("Supabase 클라이언트 세팅 완료");
                } catch (err) {
                    showAlert('연동 에러', 'Supabase 연결에 실패했습니다.', 'error');
                }
            } else {
                showAlert('초기 세팅 필요', '우측 상단의 ⚙️ 설정 아이콘을 눌러 API Key와 Supabase 정보를 입력해 주세요.', 'info');
            }
        }

        function saveConfigurations() {
            const gKey = document.getElementById('cfgGoogleKey').value.trim();
            const sUrl = document.getElementById('cfgSupabaseUrl').value.trim();
            const sKey = document.getElementById('cfgSupabaseKey').value.trim();

            if (!sUrl || !sKey) {
                showAlert('경고', 'Supabase 정보가 공란입니다.', 'warning');
                return;
            }

            localStorage.setItem('cfg_google_key', gKey);
            localStorage.setItem('cfg_supabase_url', sUrl);
            localStorage.setItem('cfg_supabase_key', sKey);

            toggleSettingsModal(false);
            loadSavedConfigurations();
            showAlert('저장 성공', 'API 및 데이터베이스 연동이 완료되었습니다.', 'success');
            loadActiveMenu();
        }

        function setupEventListeners() {
            elBtnAdminTab.addEventListener('click', () => {
                elEmployeeTab.classList.add('hidden');
                elAdminTab.classList.remove('hidden');
            });

            elBtnBackToHome.addEventListener('click', () => {
                elAdminTab.classList.add('hidden');
                elEmployeeTab.classList.remove('hidden');
            });

            elBtnSettings.addEventListener('click', () => toggleSettingsModal(true));

            elDropZone.addEventListener('click', () => elFileInput.click());
            elFileInput.addEventListener('change', handleFileSelection);

            elDropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                elDropZone.classList.add('border-emerald-500', 'bg-emerald-50/50');
            });

            elDropZone.addEventListener('dragleave', () => {
                elDropZone.classList.remove('border-emerald-500', 'bg-emerald-50/50');
            });

            elDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                elDropZone.classList.remove('border-emerald-500', 'bg-emerald-50/50');
                if (e.dataTransfer.files.length > 0) {
                    elFileInput.files = e.dataTransfer.files;
                    handleFileSelection();
                }
            });

            elBtnStartAnalysis.addEventListener('click', processWeeklyMenuWithAI);
        }

        function handleFileSelection() {
            const file = elFileInput.files[0];
            if (!file) return;

            elPreviewFileName.innerText = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                elImagePreview.src = e.target.result;
                elDropZoneContent.classList.add('hidden');
                elPreviewContainer.classList.remove('hidden');
                
                elBtnStartAnalysis.disabled = false;
                elBtnStartAnalysis.classList.remove('bg-gray-300', 'cursor-not-allowed');
                elBtnStartAnalysis.classList.add('bg-emerald-600', 'hover:bg-emerald-700', 'shadow-md');
            }
            reader.readAsDataURL(file);
        }

        function selectDay(dayNumber) {
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'shadow-md');
                btn.classList.add('text-gray-400', 'hover:bg-gray-50');
            });

            const activeBtn = document.querySelector(`.day-btn[data-day="${dayNumber}"]`);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-400', 'hover:bg-gray-50');
                activeBtn.classList.add('bg-emerald-600', 'text-white', 'shadow-md');
                
                const dateLabel = document.getElementById(`date-label-${dayNumber}`);
                if (dateLabel) {
                    const fullDateStr = dateLabel.getAttribute('data-full-date');
                    selectedDate = new Date(fullDateStr);
                }
            }
            loadActiveMenu();
        }

        function selectMeal(mealType) {
            currentMealType = mealType;
            updateMealTabUi();
            loadActiveMenu();
        }

        function updateMealTabUi() {
            document.querySelectorAll('.meal-btn').forEach(btn => {
                if (btn.getAttribute('data-meal') === currentMealType) {
                    btn.classList.add('bg-white', 'text-emerald-700', 'shadow-sm');
                } else {
                    btn.classList.remove('bg-white', 'text-emerald-700', 'shadow-sm');
                }
            });
        }

        // 데이터베이스 식단 조회 및 렌더링
        async function loadActiveMenu() {
            if (!supabaseClient) return;

            const dateStr = selectedDate.toISOString().split('T')[0];
            const dateObj = new Date(selectedDate);
            const daysKor = ['일', '월', '화', '수', '목', '금', '토'];
            elCurrentViewTitle.innerText = `${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일 (${daysKor[dateObj.getDay()]}) ${currentMealType} 식단`;

            elMenuContainer.innerHTML = '';
            elMenuEmpty.classList.add('hidden');
            elMenuLoading.classList.remove('hidden');

            try {
                // 1. 해당 날짜 및 식사구분의 식단 데이터 획득
                const { data: menuData, error: menuErr } = await supabaseClient
                    .from('sikgoo_menus')
                    .select('*')
                    .eq('menu_date', dateStr)
                    .eq('meal_type', currentMealType)
                    .maybeSingle();

                if (menuErr) throw menuErr;

                if (!menuData || !menuData.food_list || menuData.food_list.length === 0) {
                    elMenuLoading.classList.add('hidden');
                    elMenuEmpty.classList.remove('hidden');
                    elCalorieTotal.innerText = '0 Kcal';
                    return;
                }

                // 2. 식단에 포함된 요리 이미지 마스터 조회
                const { data: foodImages, error: imgErr } = await supabaseClient
                    .from('sikgoo_images')
                    .select('*')
                    .in('food_name', menuData.food_list);

                if (imgErr) throw imgErr;

                const imageMap = {};
                foodImages?.forEach(item => {
                    imageMap[item.food_name] = {
                        url: item.image_url,
                        calories: item.calories || 0
                    };
                });

                let totalCals = 0;
                elMenuContainer.innerHTML = '';

                menuData.food_list.forEach(foodName => {
                    const mapped = imageMap[foodName] || { url: null, calories: 0 };
                    totalCals += mapped.calories;

                    const placeholderImg = `https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=300&h=200`;
                    const foodImgSrc = mapped.url || placeholderImg;

                    const card = document.createElement('div');
                    card.className = "flex bg-gray-50/60 rounded-2xl overflow-hidden border border-gray-100 hover:shadow-md transition-all";
                    card.innerHTML = `
                        <div class="w-1/3 h-24 relative bg-gray-200">
                            <img src="${foodImgSrc}" class="w-full h-full object-cover" onerror="this.src='${placeholderImg}'" alt="${foodName}">
                            ${!mapped.url ? `
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center text-[10px] text-white font-bold">
                                    <i class="fa-solid fa-spinner animate-spin mr-1"></i>그리는 중
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <h4 class="font-bold text-gray-800 text-sm">${foodName}</h4>
                            <div class="flex justify-between items-center text-xs">
                                <span class="text-gray-400 font-medium">에너지량</span>
                                <span class="text-emerald-600 font-semibold">${mapped.calories ? `${mapped.calories} kcal` : '계산 중'}</span>
                            </div>
                        </div>
                    `;
                    elMenuContainer.appendChild(card);
                });

                elCalorieTotal.innerText = `${totalCals} Kcal`;
                elMenuLoading.classList.add('hidden');

            } catch (err) {
                console.error(err);
                elMenuLoading.classList.add('hidden');
                showAlert('데이터 조회 실패', 'DB로부터 데이터를 가져오는 중 실패했습니다.', 'error');
            }
        }

        // Gemini AI를 사용해 주간식단표 분석 및 데이터 저장 연동
        async function processWeeklyMenuWithAI() {
            const apiKey = localStorage.getItem('cfg_google_key');
            if (!apiKey) {
                showAlert('경고', '설정에서 Google API Key를 입력해 주셔야 작동합니다.', 'warning');
                return;
            }
            if (!supabaseClient) {
                showAlert('경고', 'Supabase 연결 상태가 원활하지 않습니다.', 'warning');
                return;
            }

            const file = elFileInput.files[0];
            if (!file) return;

            elAnalysisProgress.classList.remove('hidden');
            elBtnStartAnalysis.disabled = true;
            updateProgress('식단표 정밀 분석 진행 중...', 10, 'Google Gemini AI 엔진으로 요일별 식단 분석을 수행 중입니다.');

            try {
                const base64Data = await fileToBase64(file);
                const base64Clean = base64Data.split(',')[1];

                // 식단표 기반 JSON 구조 파싱 프롬프트
                const prompt = `
                    첨부된 구내식당 주간 식단표 사진을 분석해 주세요. 
                    월요일부터 금요일까지 각각의 날짜별로 '아침', '점심', '저녁' 메뉴가 어떻게 배열되어 있는지 파악하여 정형 JSON 형식으로 가공해 주세요.
                    
                    반드시 아래 가이드를 엄격히 따라야 합니다:
                    1. 식단표 상의 날짜 정보를 기준으로 2026년 날짜 문자열(예: '2026-07-06')을 정확하게 매핑합니다.
                    2. 각 끼니('아침', '점심', '저녁')에 나오는 구체적인 국, 반찬, 밥 명칭을 문자열 배열로 분할해 담아주세요. (예: ["현미밥", "돈가스", "배추김치"])
                    3. 마크다운 형식의 장식 기호나 텍스트 설명 없이 완전한 JSON 포맷 데이터만 아래 양식으로 반환하십시오.
                    
                    {
                      "menus": [
                        {
                          "menu_date": "YYYY-MM-DD",
                          "meal_type": "아침" | "점심" | "저녁",
                          "food_list": ["음식1", "음식2", ...]
                        }
                      ]
                    }
                `;

                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: file.type, data: base64Clean } }
                        ]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                };

                const response = await fetchWithRetry(geminiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!jsonText) throw new Error("분석 텍스트를 파싱하지 못했습니다.");

                const parsedData = JSON.parse(jsonText);
                const weeklyMenus = parsedData.menus;

                updateProgress('식단 정보 데이터베이스 적용 중...', 40, `총 ${weeklyMenus.length}건의 개별 끼니 데이터를 Supabase에 업서트(Upsert)하는 중입니다.`);

                // 추출된 음식 중복 체크용 셋(Set) 가동
                const allFoods = new Set();
                weeklyMenus.forEach(menu => {
                    menu.food_list.forEach(food => {
                        const trimmed = food.trim();
                        if (trimmed && trimmed.length > 1) {
                            allFoods.add(trimmed);
                        }
                    });
                });
                const uniqueFoods = Array.from(allFoods);

                // 식단 정보 테이블에 순차 기록
                for (let menu of weeklyMenus) {
                    const { error: menuUpsertErr } = await supabaseClient
                        .from('sikgoo_menus')
                        .upsert({
                            menu_date: menu.menu_date,
                            meal_type: menu.meal_type,
                            food_list: menu.food_list,
                            raw_ocr_text: jsonText
                        }, { onConflict: 'menu_date,meal_type' });

                    if (menuUpsertErr) console.error("식단 데이터 업로드 중 실패:", menuUpsertErr);
                }

                updateProgress('이미지 캐싱 체크 및 AI 생성 중...', 65, '데이터베이스에 이미지가 미리 생성된 음식인지 조회하고 있습니다.');

                let successCount = 0;
                for (let i = 0; i < uniqueFoods.length; i++) {
                    const foodName = uniqueFoods[i];
                    
                    // 중복 생성 방지를 위한 기구축 이미지 검색
                    const { data: existingImg, error: checkErr } = await supabaseClient
                        .from('sikgoo_images')
                        .select('*')
                        .eq('food_name', foodName)
                        .maybeSingle();

                    if (!checkErr && existingImg && existingImg.image_url) {
                        console.log(`[캐시 있음]: ${foodName}`);
                        continue;
                    }

                    const progressPercent = Math.min(65 + Math.floor((i / uniqueFoods.length) * 30), 95);
                    updateProgress(`[${i+1}/${uniqueFoods.length}] '${foodName}' 사진 그리는 중...`, progressPercent, `구글 Imagen 4.0으로 고화질 음식을 제작하고 있습니다.`);

                    try {
                        const generatedImgBase64 = await generateFoodImageWithImagen(apiKey, foodName);
                        const calEst = await estimateFoodCalorie(apiKey, foodName);

                        const { error: imgSaveErr } = await supabaseClient
                            .from('sikgoo_images')
                            .upsert({
                                food_name: foodName,
                                image_url: generatedImgBase64,
                                calories: calEst
                            }, { onConflict: 'food_name' });

                        if (imgSaveErr) throw imgSaveErr;
                        successCount++;

                    } catch (imageGenErr) {
                        console.error(`${foodName} 생성 지연:`, imageGenErr);
                    }
                }

                updateProgress('분석 완료 및 배포 완료!', 100, `주간 식단과 이미지 총 ${successCount}건에 대한 캐싱 연동이 완료되었습니다.`);
                showAlert('처리 성공', '데이터 전송 및 생성이 모두 완료되었습니다.', 'success');
                
                setTimeout(() => {
                    elAnalysisProgress.classList.add('hidden');
                    elAdminTab.classList.add('hidden');
                    elEmployeeTab.classList.remove('hidden');
                    loadActiveMenu();
                }, 2000);

            } catch (err) {
                console.error(err);
                showAlert('에러 발생', `분석하는 과정에서 오류가 났습니다: ${err.message}`, 'error');
                elAnalysisProgress.classList.add('hidden');
                elBtnStartAnalysis.disabled = false;
            }
        }

        // Google Imagen API를 통한 사진 렌더링
        async function generateFoodImageWithImagen(apiKey, foodName) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const prompt = `Close-up delicious, authentic Korean restaurant style photo of ${foodName}, appetizing lighting, high resolution, clean plate setup, food photography style, single dish, complete serving.`;
            
            const payload = {
                instances: [
                    { prompt: prompt }
                ],
                parameters: {
                    sampleCount: 1,
                    aspectRatio: "3:2",
                    outputMimeType: "image/jpeg"
                }
            };

            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            const base64Bytes = data.predictions?.[0]?.bytesBase64Encoded;
            if (!base64Bytes) throw new Error("이미지 생성이 차단되었거나 바이트 정보를 받지 못했습니다.");

            return `data:image/jpeg;base64,${base64Bytes}`;
        }

        // 음식별 칼로리 영양 판정
        async function estimateFoodCalorie(apiKey, foodName) {
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{
                        parts: [{ text: `음식 '${foodName}' 1인분 평균 열량을 숫자만 정수로 표기하여 {"calories": 숫자} JSON 양식으로 적어주세요.` }]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (jsonText) {
                    const parsed = JSON.parse(jsonText);
                    return parsed.calories || 180;
                }
            } catch (e) {
                console.warn("칼로리 분석 실패:", e);
            }
            return 220;
        }

        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errBody = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errBody}`);
                }
                return response;
            } catch (error) {
                if (retries <= 1) throw error;
                await new Promise(res => setTimeout(res, delay));
                return fetchWithRetry(url, options, retries - 1, delay * 2);
            }
        }

        function updateProgress(title, percent, detail) {
            elStatusText.innerText = title;
            elPercentText.innerText = `${percent}%`;
            elProgressBar.style.width = `${percent}%`;
            elProgressDetail.innerText = detail;
        }

        function toggleSettingsModal(isOpen) {
            if (isOpen) {
                elModalSettings.classList.remove('hidden');
                elModalSettings.classList.add('flex');
            } else {
                elModalSettings.classList.add('hidden');
                elModalSettings.classList.remove('flex');
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function showAlert(title, message, type = 'info') {
            const alertBox = document.getElementById('alertBox');
            const alertTitle = document.getElementById('alertTitle');
            const alertMsg = document.getElementById('alertMsg');
            const alertIcon = document.getElementById('alertIcon');

            alertTitle.innerText = title;
            alertMsg.innerText = message;

            alertBox.className = "mb-4 p-4 rounded-xl border flex items-start space-x-2 transition-all";
            if (type === 'success') {
                alertBox.classList.add('bg-emerald-50', 'border-emerald-100', 'text-emerald-800');
                alertIcon.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-500"></i>`;
            } else if (type === 'error') {
                alertBox.classList.add('bg-rose-50', 'border-rose-100', 'text-rose-800');
                alertIcon.innerHTML = `<i class="fa-solid fa-circle-exclamation text-rose-500"></i>`;
            } else if (type === 'warning') {
                alertBox.classList.add('bg-amber-50', 'border-amber-100', 'text-amber-800');
                alertIcon.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-amber-500"></i>`;
            } else {
                alertBox.classList.add('bg-blue-50', 'border-blue-100', 'text-blue-800');
                alertIcon.innerHTML = `<i class="fa-solid fa-circle-info text-blue-500"></i>`;
            }

            alertBox.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeAlert() {
            document.getElementById('alertBox').classList.add('hidden');
        }
    </script>
